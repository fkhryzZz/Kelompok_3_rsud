<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Pasien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="modal-overlay">
        <div class="registration-card">
            <div class="row g-0 w-100">
                <div class="col-md-5 side-panel d-flex flex-column justify-content-center">
                    <div class="icon-badge mb-4">
                        <i class="bi bi-heart-pulse-fill"></i>
                    </div>
                    <h2 class="promo-text italic">Langkah Kecil untuk Hidup Lebih Sehat.</h2>
                    <p class="promo-sub">Pendaftaran online memudahkan Anda mendapatkan nomor antrean lebih awal tanpa harus menunggu di rumah sakit.</p>
                    
                    <div class="security-info mt-auto">
                        <i class="bi bi-shield-check"></i>
                        <span>DATA TERENKRIPSI AMAN</span>
                    </div>
                </div>

                <div class="col-md-7 form-panel position-relative">
                    <button class="close-btn border-0 shadow-sm"><i class="bi bi-x-lg"></i></button>
                    <h3 class="form-title">Formulir Pendaftaran</h3>
                    <p class="form-subtitle">Lengkapi data pasien di bawah ini secara akurat.</p>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">NAMA PASIEN</label>
                            <input type="text" class="form-control" placeholder="Nama lengkap sesuai KTP">
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-6 mb-3 mb-sm-0">
                                <label class="form-label">WHATSAPP</label>
                                <input type="text" class="form-control" placeholder="0812xxxx">
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label">LAYANAN</label>
                                <select class="form-select">
                                    <option selected disabled>Pilih Departemen</option>
                                    <option>Kardiologi</option>
                                    <option>Pediatri</option>
                                    <option>Gigi & Mulut</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">RENCANA TANGGAL KUNJUNGAN</label>
                            <input type="date" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-confirm w-100 shadow">KONFIRMASI JADWAL</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
